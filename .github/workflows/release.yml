name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Build, version, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      # Publie seulement si le secret NPM_TOKEN est configure. Sans token, on ne
      # tente pas de publier (evite un E404 non authentifie a chaque push vers
      # main). Avec des changesets en attente, l'action ouvre a la place une PR
      # "Version Packages" au lieu de publier immediatement.
      - name: Create release PR or publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        uses: changesets/action@v1
        with:
          publish: npm run release
          version: npx changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish (no NPM_TOKEN)
        if: ${{ env.NPM_TOKEN == '' }}
        run: echo "NPM_TOKEN absent, publication ignoree. Ajouter le secret NPM_TOKEN pour publier sur npm."
