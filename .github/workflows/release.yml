name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Build, version, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      # Requis pour le Trusted Publishing npm (OIDC): GitHub mint un token
      # court-lived, aucun secret NPM_TOKEN a stocker.
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Trusted Publishing exige Node >= 22.14 et npm >= 11.5.1.
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # setup-node fournit npm 10 avec Node 22; on force une version npm >= 11.5.1
      # qui supporte l'echange OIDC pour le Trusted Publishing.
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      # Publication via Trusted Publishing (OIDC). Pas de NPM_TOKEN: npm detecte
      # le contexte GitHub Actions autorise et obtient un token court-lived.
      # Avec des changesets en attente, l'action ouvre a la place une PR
      # "Version Packages" au lieu de publier immediatement.
      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          publish: npm run release
          version: npx changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
